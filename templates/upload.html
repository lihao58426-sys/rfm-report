<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会员价值诊断报告</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
         background:#f8fafc; color:#1e293b; display:flex; justify-content:center;
         align-items:center; min-height:100vh; }
  .card { background:#fff; border-radius:18px; padding:40px; max-width:520px;
          box-shadow:0 10px 30px rgba(0,0,0,.08); text-align:center; }
  h1 { font-size:24px; margin-bottom:8px; }
  p { color:#64748b; font-size:14px; margin-bottom:24px; }
  input[type=file] { margin-bottom:20px; font-size:14px; }
  button { background:#4f46e5; color:#fff; border:none; padding:12px 32px;
           border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; }
  button:hover { background:#4338ca; }
  .hint { font-size:12px; color:#94a3b8; margin-top:16px; }
</style>
</head>
<body>
<div class="card">
  <h1>📊 会员价值诊断报告</h1>
  <p>上传银豹导出的交易流水 CSV（支持多文件，一次最多 4 份）</p>
  <form action="/import" method="post" enctype="multipart/form-data">
    <input type="file" name="files" multiple accept=".csv" required>
    <br>
    <button type="submit">开始分析</button>
  </form>
  <div class="hint">
    支持一次上传多个 CSV 文件（如 4 个季度的），自动合并去重表头<br>
    过滤退款单、空会员、异常金额
  </div>
</div>
</body>
</html>
