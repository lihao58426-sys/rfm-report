<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会员价值诊断报告(脱敏样例)</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background:#f8fafc; color:#1e293b; line-height:1.5; padding:14px;
  }
  .wrap { max-width:880px; margin:0 auto; }
  .header {
    background:linear-gradient(to right,#4f46e5,#3b82f6);
    border-radius:18px; padding:22px; color:#fff;
    box-shadow:0 10px 25px rgba(79,70,229,.25); margin-bottom:18px;
  }
  .header .eyebrow { font-size:13px; color:#c7d2fe; font-weight:600; margin-bottom:4px; }
  .header h1 { font-size:24px; font-weight:800; }
  .header p { color:#c7d2fe; margin-top:8px; font-size:13px; }
  .desens {
    display:inline-block; margin-top:10px; font-size:11px; font-weight:700;
    background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.35);
    color:#fff; padding:4px 10px; border-radius:7px;
  }
  .tabs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:18px; }
  .tab {
    border:none; cursor:pointer; padding:9px 13px; border-radius:9px;
    font-size:13px; font-weight:600; background:#fff; color:#64748b;
    box-shadow:0 1px 2px rgba(0,0,0,.04); transition:.15s;
  }
  .tab:hover { background:#f1f5f9; }
  .tab.active { background:#4f46e5; color:#fff; box-shadow:0 4px 10px rgba(79,70,229,.3); }
  .panel { display:none; }
  .panel.active { display:block; }
  .card {
    background:#fff; border:1px solid #f1f5f9; border-radius:14px;
    padding:18px; box-shadow:0 1px 3px rgba(0,0,0,.04); margin-bottom:16px;
  }
  .card h2 { font-size:16px; font-weight:700; color:#1e293b; margin-bottom:4px; display:flex; align-items:center; gap:7px; }
  .sub { font-size:12px; color:#94a3b8; margin-bottom:14px; }
  .kpi-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:11px; margin-bottom:16px; }
  .kpi { background:#fff; border:1px solid #f1f5f9; border-radius:13px; padding:14px; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .kpi .ic { width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:18px; margin-bottom:8px; }
  .kpi .v { font-size:20px; font-weight:800; color:#1e293b; }
  .kpi .l { font-size:12px; color:#64748b; font-weight:600; }
  .kpi .s { font-size:11px; color:#94a3b8; margin-top:2px; }
  .grid3 { display:grid; grid-template-columns:1fr; gap:11px; }
  .mini { border-radius:13px; padding:14px; border:1px solid; }
  .mini .t { font-weight:700; color:#1e293b; margin-bottom:4px; display:flex; align-items:center; gap:6px; font-size:14px; }
  .mini p { font-size:12px; color:#475569; }
  .stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:11px; }
  .stat { background:#fff; border:1px solid #f1f5f9; border-radius:13px; padding:14px; text-align:center; box-shadow:0 1px 3px rgba(0,0,0,.04); }
  .stat .v { font-size:22px; font-weight:800; }
  .stat .l { font-size:11px; color:#64748b; margin-top:4px; }
  .hbar-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .hbar-label { width:120px; font-size:11px; color:#475569; text-align:right; flex-shrink:0; line-height:1.3; }
  .hbar-track { flex:1; background:#f1f5f9; border-radius:6px; height:26px; position:relative; }
  .hbar-fill { height:100%; border-radius:6px; min-width:3px; }
  .hbar-val { font-size:11px; font-weight:700; color:#475569; flex-shrink:0; width:54px; }
  .legend { display:grid; grid-template-columns:1fr; gap:7px; margin-top:14px; }
  .legend-item { display:flex; align-items:flex-start; gap:7px; font-size:12px; color:#475569; }
  .dot { width:12px; height:12px; border-radius:3px; margin-top:2px; flex-shrink:0; }
  .note { border-radius:13px; padding:15px; font-size:12px; line-height:1.7; }
  .note .nt { font-weight:700; margin-bottom:4px; display:flex; align-items:center; gap:6px; }
  .footer { text-align:center; font-size:11px; color:#94a3b8; margin-top:22px; line-height:1.7; }
  /* —— RFM 专用 —— */
  .rfm-dim { display:grid; grid-template-columns:1fr; gap:11px; margin-bottom:14px; }
  .rfm-dim .d { border-radius:13px; padding:14px; border:1px solid; }
  .rfm-dim .dl { font-size:24px; font-weight:800; line-height:1; }
  .rfm-dim .dn { font-weight:700; color:#1e293b; font-size:13px; margin:5px 0 3px; }
  .rfm-dim p { font-size:12px; color:#475569; line-height:1.6; }
  .rfm-seg { border-radius:13px; padding:14px; border:1px solid #f1f5f9; border-left-width:5px; box-shadow:0 1px 3px rgba(0,0,0,.04); margin-bottom:11px; background:#fff; }
  .rfm-seg .sh { display:flex; align-items:baseline; justify-content:space-between; gap:8px; flex-wrap:wrap; }
  .rfm-seg .sn { font-weight:700; color:#1e293b; font-size:15px; }
  .rfm-seg .scount { font-size:12px; font-weight:700; color:#475569; }
  .rfm-tag { display:inline-block; font-size:10px; font-weight:700; padding:2px 7px; border-radius:5px; margin:6px 4px 0 0; }
  .rfm-seg .sd { font-size:12px; color:#475569; margin-top:8px; line-height:1.6; }
  .rfm-seg .sa { font-size:12px; color:#1e293b; margin-top:6px; line-height:1.6; background:#f8fafc; border-radius:7px; padding:8px 10px; }
  .money-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:9px; }
  .money-chip { font-size:11px; font-weight:700; padding:5px 9px; border-radius:7px; background:#f8fafc; border:1px solid #f1f5f9; color:#334155; }
  .money-chip b { font-size:13px; }
  /* —— 同比 —— */
  .yoy { display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap; padding:6px 0; }
  .yoy .box { text-align:center; }
  .yoy .yv { font-size:22px; font-weight:800; color:#1e293b; }
  .yoy .yl { font-size:11px; color:#64748b; margin-top:3px; }
  .yoy .arrow { font-size:26px; color:#cbd5e1; }
  .yoy .delta { font-size:20px; font-weight:800; }
  /* —— 行动优先级表 —— */
  .tbl-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .tbl { width:100%; border-collapse:collapse; font-size:12px; min-width:560px; }
  .tbl th { background:#f8fafc; text-align:left; padding:9px 10px; font-weight:700; color:#475569; border-bottom:2px solid #e2e8f0; white-space:nowrap; }
  .tbl td { padding:9px 10px; border-bottom:1px solid #f1f5f9; color:#475569; vertical-align:top; line-height:1.5; }
  .tbl tr:last-child td { border-bottom:none; }
  .pri-tag { display:inline-block; font-size:10px; font-weight:700; padding:3px 8px; border-radius:5px; color:#fff; white-space:nowrap; }
  b.amber{color:#d97706}b.red{color:#ef4444}b.blue{color:#2563eb}b.violet{color:#7c3aed}b.dark{color:#1e293b}b.green{color:#059669}
  @media(min-width:640px){
    .kpi-grid{grid-template-columns:repeat(5,1fr)}
    .grid3{grid-template-columns:repeat(3,1fr)}
    .legend{grid-template-columns:repeat(2,1fr)}
    .rfm-dim{grid-template-columns:repeat(3,1fr)}
    .header h1{font-size:28px}
  }
</style>
</head>

<div class="wrap" id="app"></div>

<script>
/* ============================================================

    { name:"新客/低频客户", r:"近", f:"低", m:"低", members:800, color:"#38bdf8",
      revenueYuan:34000,   avgPerVisit:42,

      basis:"每次到店均消 ¥175,在沉默客群中最高,流失代价最大", expect:"按召回 30% 估 ≈ ¥1.1 万/轮",
      owner:"店长 / 私域", color:"#ef4444" },
    { priority:"P1", action:"新客习惯养成(暑期卡)", target:"新客/低频 800 人",
      basis:"已到店、未成习惯,是留存主战场", expect:"转化 20% 为复购,撬动后续多次到店",
      owner:"前台 / 营销", color:"#f59e0b" },
    { priority:"P1", action:"提升客单价", target:"一般活跃客户 250 人",
      basis:"黏性好但单次仅 ¥65,远低于均值", expect:"单次 +¥20,按现有频次 ≈ ¥1 万+/年",
      owner:"现场销售", color:"#f59e0b" },
    { priority:"P2", action:"维稳防流失", target:"重要价值客户 1400 人",
      basis:"撑起约半数营收,丢一个抵十个新客", expect:"专属权益锁客,守住约 ¥36 万基本盘",
      owner:"店长", color:"#3b82f6" },
    { priority:"P2", action:"高价值挽留", target:"重要挽留 130 人",
      basis:"金额高但黏性差,处于流失边缘", expect:"回归礼遇,挽回部分高客单",
      owner:"私域", color:"#3b82f6" },
    { priority:"P3", action:"低成本批量触达", target:"一般客户 1300 人 + 流失 950 人",
      basis:"基数大、单体价值低,不宜重投入", expect:"节日群发维持曝光,成本极低",
      owner:"系统群发", color:"#94a3b8" },
  ],

  /* —— 月度淡旺季 —— */
  defaultTypeRatio: {
    "重要价值客户":0.50, "重要唤回客户":0.12, "重要发展客户":0.08, "重要挽留客户":0.07,
    "一般活跃客户":0.04, "一般客户":0.10, "新客/低频客户":0.06, "流失客户":0.03
  },
  monthly: [
    { m:"2025年6月",  byType:{ "重要价值客户":18000,"重要唤回客户":6500,"重要发展客户":800,"重要挽留客户":2500,"一般活跃客户":900,"一般客户":8500,"新客/低频客户":1200,"流失客户":3600 } },
    { m:"2025年7月",  byType:{ "重要价值客户":35000,"重要唤回客户":13000,"重要发展客户":1500,"重要挽留客户":5500,"一般活跃客户":1800,"一般客户":19000,"新客/低频客户":3200,"流失客户":9000 } },
    { m:"2025年8月",  byType:{ "重要价值客户":38000,"重要唤回客户":14000,"重要发展客户":1800,"重要挽留客户":6200,"一般活跃客户":2000,"一般客户":21000,"新客/低频客户":3500,"流失客户":8500 } },
    { m:"2025年9月",  byType:{ "重要价值客户":22000,"重要唤回客户":1200,"重要发展客户":700,"重要挽留客户":900,"一般活跃客户":700,"一般客户":17000,"新客/低频客户":700,"流失客户":800 } },
    { m:"2025年10月", byType:{ "重要价值客户":18000,"重要唤回客户":0,"重要发展客户":600,"重要挽留客户":6000,"一般活跃客户":450,"一般客户":22650,"新客/低频客户":300,"流失客户":0 } },
    { m:"2025年11月", byType:{ "重要价值客户":9500,"重要唤回客户":0,"重要发展客户":600,"重要挽留客户":0,"一般活跃客户":250,"一般客户":19350,"新客/低频客户":300,"流失客户":0 }},
    { m:"2025年12月", byType:{ "重要价值客户":7000,"重要唤回客户":0,"重要发展客户":200,"重要挽留客户":0,"一般活跃客户":150,"一般客户":16350,"新客/低频客户":300,"流失客户":0 } },
    { m:"2026年1月",  byType:{ "重要价值客户":12000,"重要唤回客户":0,"重要发展客户":400,"重要挽留客户":0,"一般活跃客户":150,"一般客户":23150,"新客/低频客户":300,"流失客户":0 } },
    { m:"2026年2月",  byType:{ "重要价值客户":20000,"重要唤回客户":0,"重要发展客户":900,"重要挽留客户":0,"一般活跃客户":600,"一般客户":27500,"新客/低频客户":1000,"流失客户":0 } },
    { m:"2026年3月",  byType:{ "重要价值客户":28000,"重要唤回客户":0,"重要发展客户":1200,"重要挽留客户":0,"一般活跃客户":1500,"一般客户":19300,"新客/低频客户":2000,"流失客户":0 } },
    { m:"2026年4月",  byType:{ "重要价值客户":48000,"重要唤回客户":0,"重要发展客户":4000,"重要挽留客户":0,"一般活跃客户":3500,"一般客户":0,"新客/低频客户":8500,"流失客户":0 } },
    { m:"2026年5月",  byType:{ "重要价值客户":52000,"重要唤回客户":0,"重要发展客户":6000,"重要挽留客户":0,"一般活跃客户":3800,"一般客户":0,"新客/低频客户":8200,"流失客户":0 } },
    { m:"2026年6月",  byType:{ "重要价值客户":30000,"重要唤回客户":0,"重要发展客户":3200,"重要挽留客户":0,"一般活跃客户":2300,"一般客户":0,"新客/低频客户":9500,"流失客户":0 } },
  ],
};

/* ============================================================
   自动计算 + 渲染(通常不需要改动)
   ============================================================ */
const C = CONFIG;
const active   = C.freqMembers + C.midMembers + C.onceMembers;
const sleeping = C.totalMembers - active;
const perCapita   = Math.round(C.annualRevenueWan * 10000 / active);
const convertible     = C.onceMembers + C.midMembers;

const num = n => Math.round(n).toLocaleString('en-US');
const pct = (x, d=1) => (x*100).toFixed(d) + '%';
const pyMax = Math.max(sleeping, C.freqMembers, C.midMembers, C.onceMembers);

// —— RFM 自动计算 ——
const rfmDisplay = C.rfmSegments.slice();
const rfmKnownSum = C.rfmSegments.reduce((s,x)=>s+(x.members||0),0);
const anonCount = C.rfmAnonymous.records || 0;
const rfmOther = active - rfmKnownSum - anonCount;
if (rfmOther > 0) {
  rfmDisplay.push({ name:"其余分群(待补充)", members:rfmOther, color:"#e2e8f0", placeholder:true,
    define:"尚未填入的分群。把人数补进 CONFIG 的 rfmSegments 后,此占位会自动消失。", action:"—" });
}
const rfmTotal = rfmKnownSum;
const rfmRevTotal = C.rfmSegments.reduce((s,x)=> s + (x.revenueYuan||0), 0);
const rfmMax = Math.max.apply(null, rfmDisplay.map(x=>x.members));
const topShare = C.rfmSegments[0].revenueYuan / rfmRevTotal;

const rfmBars = rfmDisplay.map(function(s){
  return '<div class="hbar-row">'
    + '<div class="hbar-label">'+s.name+'</div>'
    + '<div class="hbar-track"><div class="hbar-fill" style="width:'+pct(s.members/rfmMax,1)+';background:'+s.color+'"></div></div>'
    + '<div class="hbar-val">'+num(s.members)+'</div></div>';
}).join('');

const rfmCards = rfmDisplay.map(function(s){
  var tags = [];
  if (s.r) tags.push('<span class="rfm-tag" style="background:#eff6ff;color:#2563eb">R 最近 · '+s.r+'</span>');
  if (s.f) tags.push('<span class="rfm-tag" style="background:#fffbeb;color:#d97706">F 频率 · '+s.f+'</span>');
  if (s.m) tags.push('<span class="rfm-tag" style="background:#ecfdf5;color:#059669">M 金额 · '+s.m+'</span>');
  var chips = [];
  if (s.revenueYuan!=null)
