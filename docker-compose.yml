# ── RFM 客户价值分析 — 服务编排 ──
# 用法：
#   docker compose up -d          # 后台启动
#   docker compose down           # 停止

services:
  rfm-report:
    build: .
    image: rfm-report:latest
    container_name: rfm-report
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - RFM_PASSWORD=${RFM_PASSWORD:-}   # 不设则跳过鉴权
